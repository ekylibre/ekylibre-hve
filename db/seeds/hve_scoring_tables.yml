# IFT Pc/Pf reference values per filière and region.
# Source: tabs Scoring_GC / Scoring_Viticulture / Scoring_Arboriculture
# in grille-audit-hvev4-v1.14 - vf.xlsx.
#
# Format:
#   filiere:        gc | viticulture | arboriculture | horticulture
#   region:         NUTS-2 name | bassin viticole | region fruitière
#   ift_type:       herbicide | hors_herbicide
#   pc:             plancher (20e percentile)
#   pf:             plafond (70e percentile)
#
# IMPORTANT: these are an indicative subset of the official grid. The
# full reference covers ~50 region × filière combinations and must be
# refreshed annually when the ministry updates the grille. See
# bin/import_scoring_tables.rb to regenerate this file from a fresh
# Excel grid.

